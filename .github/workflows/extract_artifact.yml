name: Extract Artifact to Samples

# 過去のworkflow runで生成された artifact を取り出して
# samples/<topic_id>/ にコミットする。スマホ閲覧用の直リン生成のための仕組み。

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Workflow run ID (numeric) containing the artifact'
        required: true
        type: string
      artifact_name:
        description: 'Artifact name to download (e.g. youtube-output-27)'
        required: true
        type: string
      topic_id:
        description: 'Topic ID (folder name under samples/)'
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact from specified run
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          run-id: ${{ inputs.run_id }}
          github-token: ${{ github.token }}
          path: ./downloaded

      - name: List downloaded contents
        run: |
          echo "=== downloaded ==="
          ls -la downloaded/ || true

      - name: Copy sample files
        run: |
          T="${{ inputs.topic_id }}"
          mkdir -p samples/$T
          # thumbnail + first 2 chapter images
          for f in ${T}_thumb.png ${T}_img_1.png ${T}_img_2.png ${T}_img_3.png ${T}_img_4.png ${T}_img_5.png; do
            if [ -f "downloaded/$f" ]; then
              cp "downloaded/$f" "samples/$T/$f"
              echo "copied: $f"
            else
              echo "missing: $f"
            fi
          done
          # also surface state/meta json for transparency
          [ -f downloaded/state.json ] && cp downloaded/state.json samples/$T/state.json || true
          [ -f downloaded/${T}_meta.json ] && cp downloaded/${T}_meta.json samples/$T/${T}_meta.json || true
          ls -la samples/$T/

      - name: Commit & push samples
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add samples/
          if git diff --staged --quiet; then
            echo "No new sample changes."
          else
            git commit -m "chore(samples): extract ${{ inputs.artifact_name }} -> samples/${{ inputs.topic_id }} [skip ci]"
            git pull --rebase origin main || git rebase --abort || true
            git push origin main
          fi
