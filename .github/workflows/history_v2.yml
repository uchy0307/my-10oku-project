name: History v2 (samurai long-form 30min pipeline)

# Brand-new clean long-form pipeline (2026-05-21). Does NOT depend on existing
# youtube_auto.yml / shorts_v2.yml. Generates a >=30min video from
# youtube/history_v2/scripts/long_${LONG_INDEX}.json and uploads to
# @japanese.samurai.channel via the YOUTUBE_* OAuth refresh token.

on:
  workflow_dispatch:
    inputs:
      long_index:
        description: 'Long-form index (001-003)'
        type: string
        required: true
        default: '001'

permissions:
  contents: read
  actions: read

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      LONG_INDEX: ${{ inputs.long_index }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg + fonts-noto-cjk
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg fonts-noto-cjk
          fc-cache -f
          ffmpeg -version | head -n 1
          ls /usr/share/fonts/opentype/noto/ | grep -i cjk | head -5 || echo "(noto cjk list)"

      - name: Install edge-tts + Pillow
        run: |
          python -m pip install --upgrade pip
          pip install Pillow==10.4.0 edge-tts==6.1.12
          edge-tts --list-voices | grep -i nanami | head -3

      - name: Install npm deps (googleapis only)
        run: npm install --no-audit --no-fund googleapis@144

      - name: Validate script file exists
        run: |
          test -f "youtube/history_v2/scripts/long_${LONG_INDEX}.json" \
            || (echo "missing script: youtube/history_v2/scripts/long_${LONG_INDEX}.json" && exit 1)
          echo "script ok: youtube/history_v2/scripts/long_${LONG_INDEX}.json"

      - name: Spec-compliance gate (pre-pipeline assets)
        # Physical gate: blocks pipeline if pre-committed edge-tts NanamiNeural audio missing.
        # Forces local-runner edge-tts workflow; blocks gTTS-only runs from reaching upload.
        # Spec ref: feedback_yt_pipeline_quality_v2.md (5/21 final spec: edge-tts NanamiNeural / atempo=1.00).
        run: |
          AUDIO_FILE="youtube/history_v2/audio/${LONG_INDEX}.mp3"
          if [ ! -f "$AUDIO_FILE" ]; then
            echo "::error title=spec-gate-1::edge-tts NanamiNeural audio missing: $AUDIO_FILE"
            echo "::error::Local runner で edge-tts NanamiNeural 生成 → commit 後に再実行してください。upload abort."
            exit 1
          fi
          SAMPLE_RATE=$(ffprobe -v error -select_streams a -show_entries stream=sample_rate -of csv=p=0 "$AUDIO_FILE" || echo "0")
          if [ "$SAMPLE_RATE" != "24000" ] && [ "$SAMPLE_RATE" != "44100" ] && [ "$SAMPLE_RATE" != "48000" ]; then
            echo "::warning title=spec-gate-2::audio sample_rate=$SAMPLE_RATE Hz は edge-tts 標準 (24000/44100/48000) と乖離。要確認"
          fi
          echo "OK pre-pipeline gates passed: AUDIO=$AUDIO_FILE rate=$SAMPLE_RATE"

      - name: Run history_v2 pipeline
        id: pipe
        if: ${{ hashFiles(format('youtube/history_v2/audio/{0}.mp3', inputs.long_index)) != '' }}
        run: node youtube/history_v2/pipeline.mjs

      - name: Spec-compliance gate (post-pipeline output)
        # Surfaces spec violation as workflow failure even if pipeline already uploaded.
        # TODO: split pipeline.mjs into generate+upload so this gate can be physically pre-upload.
        if: always()
        run: |
          VIDEO_FILE="output/history_${LONG_INDEX}.mp4"
          if [ ! -f "$VIDEO_FILE" ]; then
            echo "::warning::post-gate skipped — video not found at $VIDEO_FILE (pipeline may have failed earlier)"
            exit 0
          fi
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$VIDEO_FILE" | cut -d. -f1)
          if [ "$DURATION" -lt 1800 ]; then
            echo "::error title=spec-gate-3::video duration=${DURATION}s < 1800s required (history_v2 = 30min)"
            exit 1
          fi
          echo "OK post-pipeline gate passed: duration=${DURATION}s >= 1800s"

      - name: Report
        if: always()
        run: |
          if [ -n "${{ steps.pipe.outputs.video_url }}" ]; then
            echo "::notice title=history_v2 SUCCESS::index=${LONG_INDEX} url=${{ steps.pipe.outputs.video_url }} dur=${{ steps.pipe.outputs.duration_sec }}s"
          else
            echo "::error title=history_v2 FAILED::index=${LONG_INDEX} - no video_url emitted"
            exit 1
          fi
