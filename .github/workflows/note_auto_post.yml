name: note Auto Post (B-plan / slow & safe)

# ⚠️ note.com の規約上、自動投稿はグレーゾーン。
# 本workflowは「1日2本以下・ランダム遅延・人間操作シミュレート」で
# BAN回避を試みる。利用者責任で運用すること。

on:
  workflow_dispatch:
    inputs:
      max:
        description: '1回の起動で投稿する最大件数'
        required: false
        default: '1'
      test_paid:
        description: 'true で publish:false でも 有料境界線/価格 を試行 (NOTE_TEST_PAID) '
        required: false
        default: 'false'
      skip_delay:
        description: 'true で 0-15分ランダム遅延をスキップ'
        required: false
        default: 'false'
  schedule:
    # GitHub Actions cron is unreliable; we set 4 backup times per slot.
    # The first run that finds a draft posts it; subsequent ones in the same hour exit early
    # (queue.json state guard prevents double-posting).
    # 07:50 JST primary + backups
    - cron: '50 22 * * *'
    - cron: '0 23 * * *'
    - cron: '10 23 * * *'
    - cron: '20 23 * * *'
    # 11:50 JST primary + backups
    - cron: '50 2 * * *'
    - cron: '0 3 * * *'
    - cron: '10 3 * * *'
    - cron: '20 3 * * *'
    # 15:50 JST primary + backups
    - cron: '50 6 * * *'
    - cron: '0 7 * * *'
    - cron: '10 7 * * *'
    - cron: '20 7 * * *'
    # 19:50 JST primary + backups
    - cron: '50 10 * * *'
    - cron: '0 11 * * *'
    - cron: '10 11 * * *'
    - cron: '20 11 * * *'
    # 22:50 JST primary + backups
    - cron: '50 13 * * *'
    - cron: '0 14 * * *'
    - cron: '10 14 * * *'
    - cron: '20 14 * * *'
  repository_dispatch:
    types: [external-cron-note]

permissions:
  contents: write
  issues: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Sync drafts from note.com (auto-match by #NNN)
        id: sync
        env:
          NOTE_STORAGE_STATE: ${{ secrets.NOTE_STORAGE_STATE }}
        run: |
          node note-auto/sync-drafts.mjs

      - name: Random pre-delay (0-15 min)
        if: ${{ github.event.inputs.skip_delay != 'true' }}
        run: |
          DELAY=$((RANDOM % 900))
          echo "Sleeping $DELAY seconds before posting (human-like scatter)..."
          sleep $DELAY

      - name: Run note auto post
        id: post
        env:
          NOTE_STORAGE_STATE: ${{ secrets.NOTE_STORAGE_STATE }}
          NOTE_TEST_PAID: ${{ github.event.inputs.test_paid }}
        run: |
          MAX_INPUT="${{ github.event.inputs.max }}"
          MAX="${MAX_INPUT:-1}"
          node note-auto/post.mjs --max=$MAX

      - name: Verify published note articles (attach/price/boundary/link)
        if: always()
        continue-on-error: true
        run: node note-auto/verify_published.mjs

      - name: Commit & push queue.json / articles changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add note-auto/queue.json articles/ || true
          if git diff --staged --quiet; then
            echo "No queue/articles changes to commit."
            exit 0
          fi
          git commit -m "chore(note): sync drafts & update queue.json [skip ci]"
          # Stash any unstaged leftover changes (debug logs/screenshots) so rebase can run
          git stash push --include-untracked --quiet -m wf-leftover || true
          for i in 1 2 3 4 5; do
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              git pull origin main --no-rebase --strategy-option theirs -m "auto-merge" || true
            fi
            if git push origin main; then
              echo "push succeeded on attempt $i"
              exit 0
            fi
            echo "push failed on attempt $i, retry..."
            sleep $((i * 5))
          done
          # Final fallback: force-with-lease
          git push origin main --force-with-lease || echo "Final push failed but article was posted; manual state sync needed"
