name: note Auto Post (B-plan / slow & safe)

# ⚠️ note.com の規約上、自動投稿はグレーゾーン。
# 本workflowは「1日2本以下・ランダム遅延・人間操作シミュレート」で
# BAN回避を試みる。利用者責任で運用すること。

on:
  workflow_dispatch:
    inputs:
      max:
        description: '1回の起動で投稿する最大件数'
        required: false
        default: '1'
      test_paid:
        description: 'true で publish:false でも 有料境界線/価格 を試行（NOTE_TEST_PAID）'
        required: false
        default: 'false'
      skip_delay:
        description: 'true で 0-15分ランダム遅延をスキップ'
        required: false
        default: 'false'
  schedule:
    # 1日2回（UTC基準）。実行時刻はworkflow内で更にランダム遅延を挟む。
    - cron: '50 22 * * *'  # 07:50 JST
    - cron: '50 2 * * *'   # 11:50 JST
    - cron: '50 6 * * *'   # 15:50 JST
    - cron: '50 10 * * *'  # 19:50 JST
    - cron: '50 13 * * *'  # 22:50 JST

permissions:
  contents: write
  issues: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Sync drafts from note.com (auto-match by #NNN)
        id: sync
        env:
          NOTE_STORAGE_STATE: ${{ secrets.NOTE_STORAGE_STATE }}
        run: |
          node note-auto/sync-drafts.mjs

      - name: Random pre-delay (0-15 min)
        if: ${{ github.event.inputs.skip_delay != 'true' }}
        run: |
          DELAY=$((RANDOM % 900))
          echo "Sleeping $DELAY seconds before posting (human-like scatter)..."
          sleep $DELAY

      - name: Run note auto post
        id: post
        env:
          NOTE_STORAGE_STATE: ${{ secrets.NOTE_STORAGE_STATE }}
          NOTE_TEST_PAID: ${{ github.event.inputs.test_paid }}
        run: |
          MAX_INPUT="${{ github.event.inputs.max }}"
          MAX="${MAX_INPUT:-1}"
          node note-auto/post.mjs --max=$MAX

      - name: Commit & push queue.json / articles changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add note-auto/queue.json articles/ || true
          if git diff --staged --quiet; then
            echo "No queue/articles changes to commit."
            exit 0
          fi
          git commit -m "chore(note): sync drafts & update queue.json [skip ci]"
          # Retry rebase+push up to 5 times for race conditions
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; git pull origin main --no-rebase --strategy-option theirs -m "auto-merge"; }
            if git push origin main; then
              echo "push succeeded on attempt $i"
              exit 0
            fi
            echo "push failed on attempt $i, retry..."
            sleep $((i * 5))
          done
          # Final fallback: force-with-lease
          git push origin main --force-with-lease || echo "Final push failed but article was posted; manual state sync needed"
