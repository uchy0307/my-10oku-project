name: note Auto Post (B-plan / slow & safe)

# ⚠️ note.com の規約上、自動投稿はグレーゾーン。
# 本workflowは「1日2本以下・ランダム遅延・人間操作シミュレート」で
# BAN回避を試みる。利用者責任で運用すること。
#
# 新方針: 完全自動ログインは bot 検知で失敗しやすいため、
# NOTE_STORAGE_STATE （Playwright storageState JSON）に保存された
# 認証済セッションを再利用して下書きを編集・保存する。

on:
  workflow_dispatch:
    inputs:
      max:
        description: '1回の起動で投稿する最大件数'
        required: false
        default: '1'
  schedule:
    # 1日2回（UTC基準）。実行時刻はworkflow内で更にランダム遅延を挟む。
    # 03:17 UTC = 日本時間 12:17
    - cron: '17 3 * * *'
    # 11:43 UTC = 日本時間 20:43
    - cron: '43 11 * * *'

permissions:
  contents: write
  issues: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Sync drafts from note.com (auto-match by #NNN)
        id: sync
        env:
          NOTE_STORAGE_STATE: ${{ secrets.NOTE_STORAGE_STATE }}
        run: |
          node note-auto/sync-drafts.mjs

      - name: Random pre-delay (0-15 min)
        run: |
          DELAY=$((RANDOM % 900))
          echo "Sleeping $DELAY seconds before posting (human-like scatter)..."
          sleep $DELAY

      - name: Run note auto post
        id: post
        env:
          NOTE_STORAGE_STATE: ${{ secrets.NOTE_STORAGE_STATE }}
        run: |
          MAX_INPUT="${{ github.event.inputs.max }}"
          MAX="${MAX_INPUT:-1}"
          node note-auto/post.mjs --max=$MAX

      - name: Commit & push queue.json / articles changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add note-auto/queue.json articles/ || true
          if git diff --staged --quiet; then
            echo "No queue/articles changes to commit."
          else
            git commit -m "chore(note): sync drafts & update queue.json [skip ci]"
            git push
          fi
