name: Preprocess Articles

on:
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run preprocess script
        run: node scripts/preprocess-articles.mjs
      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add articles/
          if git diff --cached --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'chore(preprocess): scrub 47歳 + inject app link blocks'
            git push
          fi
