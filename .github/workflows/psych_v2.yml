name: Psych v2 (long-form clean pipeline)

# 新規 clean long-form pipeline (2026-05-21).
# 既存 otona_youtube_auto_day.yml / new_youtube_auto.yml 等には一切依存しない。
# stock 済の youtube/psych_v2/scripts/psych_${PSYCH_INDEX}.json を元に
# 章分割 edge-tts (NanamiNeural) + ffmpeg で 16:9 / 1920x1080 / duration >= 1800s の動画を生成して
# NEW_YOUTUBE_* secrets が紐づく YouTube channel (@Otona_Psychology) に upload する。

on:
  workflow_dispatch:
    inputs:
      psych_index:
        description: 'Psych index (001-003)'
        type: string
        required: true
        default: '001'
  schedule:
    # 07:00 JST = 22:00 UTC (previous day) → psych_index=001
    - cron: '0 22 * * *'
    # 13:00 JST = 04:00 UTC → psych_index=002
    - cron: '0 4 * * *'
    # 19:00 JST = 10:00 UTC → psych_index=003
    - cron: '0 10 * * *'

permissions:
  contents: read
  actions: read

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      YOUTUBE_CLIENT_ID: ${{ secrets.NEW_YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.NEW_YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.NEW_YOUTUBE_REFRESH_TOKEN }}
    steps:
      - name: Determine PSYCH_INDEX
        run: |
          if [ -n "${{ inputs.psych_index }}" ]; then
            echo "PSYCH_INDEX=${{ inputs.psych_index }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 22 * * *" ]; then
            echo "PSYCH_INDEX=001" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 4 * * *" ]; then
            echo "PSYCH_INDEX=002" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 10 * * *" ]; then
            echo "PSYCH_INDEX=003" >> $GITHUB_ENV
          else
            echo "PSYCH_INDEX=001" >> $GITHUB_ENV
          fi
          echo "Resolved PSYCH_INDEX for this run"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg + fonts-noto-cjk
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg fonts-noto-cjk fonts-noto-cjk-extra
          fc-cache -f
          ffmpeg -version | head -n 1
          ls /usr/share/fonts/opentype/noto/ | head -20 || true
          fc-list | grep -i 'noto sans cjk jp' | head -3 || echo "noto cjk jp font check"

      - name: Install edge-tts + Pillow
        run: |
          python -m pip install --upgrade pip
          pip install Pillow==10.4.0 edge-tts==6.1.12
          edge-tts --list-voices | grep -i nanami | head -3
          python -c "from PIL import Image, ImageDraw, ImageFont, ImageFilter; print('Pillow ok')"

      - name: Install npm deps (googleapis only)
        run: npm install --no-audit --no-fund googleapis@144

      - name: Validate script exists
        run: |
          test -f "youtube/psych_v2/scripts/psych_${PSYCH_INDEX}.json" \
            || (echo "missing script: youtube/psych_v2/scripts/psych_${PSYCH_INDEX}.json" && exit 1)
          echo "script ok: youtube/psych_v2/scripts/psych_${PSYCH_INDEX}.json"

      - name: Spec-compliance gate (pre-pipeline assets)
        # Physical gate (大人YT pipeline):
        # - Gate 1: edge-tts NanamiNeural pre-committed audio mandatory
        # - Gate 2: 画像 >= 10 枚必須 (spec: feedback_yt_pipeline_quality_v2.md)
        # Blocks gTTS-only / 画像不足 runs from reaching upload.
        run: |
          AUDIO_FILE="youtube/psych_v2/audio/${PSYCH_INDEX}.mp3"
          if [ ! -f "$AUDIO_FILE" ]; then
            echo "::error title=spec-gate-1::edge-tts NanamiNeural audio missing: $AUDIO_FILE"
            echo "::error::Local runner で edge-tts NanamiNeural 生成 → commit 後に再実行。upload abort."
            exit 1
          fi
          IMG_DIR="youtube/psych_v2/images/${PSYCH_INDEX}"
          IMAGE_COUNT=$(find "$IMG_DIR" -type f \( -name "*.jpg" -o -name "*.jpeg" -o -name "*.png" -o -name "*.webp" \) 2>/dev/null | wc -l)
          if [ "$IMAGE_COUNT" -lt 10 ]; then
            echo "::error title=spec-gate-2::大人YT 画像が $IMAGE_COUNT 枚 < 10 枚必須 ($IMG_DIR)"
            echo "::error::画像 10-15 枚を pre-commit してください。upload abort."
            exit 1
          fi
          echo "OK pre-pipeline gates passed: AUDIO=$AUDIO_FILE IMG_COUNT=$IMAGE_COUNT"

      - name: Run psych_v2 pipeline
        id: pipe
        if: ${{ hashFiles(format('youtube/psych_v2/audio/{0}.mp3', env.PSYCH_INDEX)) != '' && hashFiles(format('youtube/psych_v2/images/{0}/**', env.PSYCH_INDEX)) != '' }}
        run: node youtube/psych_v2/pipeline.mjs

      - name: Spec-compliance gate (post-pipeline output)
        # Surfaces spec violation as workflow failure even if pipeline already uploaded.
        # TODO: split pipeline.mjs into generate+upload so this gate can be physically pre-upload.
        if: always()
        run: |
          VIDEO_FILE="output/psych_${PSYCH_INDEX}.mp4"
          if [ ! -f "$VIDEO_FILE" ]; then
            echo "::warning::post-gate skipped — video not found at $VIDEO_FILE (pipeline may have failed earlier)"
            exit 0
          fi
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$VIDEO_FILE" | cut -d. -f1)
          if [ "$DURATION" -lt 900 ]; then
            echo "::error title=spec-gate-3::大人YT duration=${DURATION}s < 900s required (本編尺最低 15min)"
            exit 1
          fi
          echo "OK post-pipeline gate passed: duration=${DURATION}s >= 900s"

      - name: Report
        if: always()
        run: |
          if [ -n "${{ steps.pipe.outputs.video_url }}" ]; then
            echo "::notice title=Psych v2 SUCCESS::index=${PSYCH_INDEX} duration=${{ steps.pipe.outputs.final_duration }}s url=${{ steps.pipe.outputs.video_url }}"
          else
            echo "::error title=Psych v2 FAILED::index=${PSYCH_INDEX} - no video_url emitted"
            exit 1
          fi
