name: Shorts v2 (samurai clean pipeline)

# 新規 clean Shorts pipeline (2026-05-21). 既存 youtube_shorts_auto.yml には依存しない。
# stock 済の youtube/shorts_v2/scripts/short_${SHORT_INDEX}.json を元に gtts + ffmpeg で
# 9:16 動画を生成して @japanese.samurai.channel に upload する。

on:
  workflow_dispatch:
    inputs:
      short_index:
        description: 'Short index (001-010)'
        type: string
        required: true
        default: '001'
# === schedule 一時停止 (2026-05-23) ===
# Run #16 失敗. 原因解明 (必要な asset を commit) 後に schedule を再開すること.
  # schedule:
    # 09:00 JST = 00:00 UTC → short_index=001
    # - cron: '0 0 * * *'
    # 12:00 JST = 03:00 UTC → short_index=002
    # - cron: '0 3 * * *'
    # 15:00 JST = 06:00 UTC → short_index=003
    # - cron: '0 6 * * *'
    # 18:00 JST = 09:00 UTC → short_index=004
    # - cron: '0 9 * * *'
    # 21:00 JST = 12:00 UTC → short_index=005
    # - cron: '0 12 * * *'

permissions:
  contents: read
  actions: read

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
    steps:
      - name: Determine SHORT_INDEX
        run: |
          if [ -n "${{ inputs.short_index }}" ]; then
            echo "SHORT_INDEX=${{ inputs.short_index }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 0 * * *" ]; then
            echo "SHORT_INDEX=001" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 3 * * *" ]; then
            echo "SHORT_INDEX=002" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 6 * * *" ]; then
            echo "SHORT_INDEX=003" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 9 * * *" ]; then
            echo "SHORT_INDEX=004" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 12 * * *" ]; then
            echo "SHORT_INDEX=005" >> $GITHUB_ENV
          else
            echo "SHORT_INDEX=001" >> $GITHUB_ENV
          fi
          echo "Resolved SHORT_INDEX for this run"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg + fonts-noto-cjk
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg fonts-noto-cjk
          fc-cache -f
          ffmpeg -version | head -n 1
          fc-list | grep -i 'noto sans cjk jp' | head -3 || echo "noto cjk jp font check"

      - name: Install gtts (Google Translate TTS)
        run: |
          python -m pip install --upgrade pip
          pip install gTTS==2.5.4
          gtts-cli --help | head -3

      - name: Install npm deps (googleapis only needed)
        run: npm install --no-audit --no-fund googleapis@144

      - name: Validate script file exists
        run: |
          test -f "youtube/shorts_v2/scripts/short_${SHORT_INDEX}.json" \
            || (echo "missing script: youtube/shorts_v2/scripts/short_${SHORT_INDEX}.json" && exit 1)
          echo "script ok: youtube/shorts_v2/scripts/short_${SHORT_INDEX}.json"

      - name: Run shorts_v2 pipeline
        id: pipe
        run: node youtube/shorts_v2/pipeline.mjs

      - name: Spec-compliance gate (post-pipeline Shorts duration)
        # Verify duration on the actual mp4 written by pipeline.mjs (youtube/shorts_v2/.work/{INDEX}/output.mp4).
        # Pipeline.mjs now also enforces this internally, so this is a redundant defensive gate.
        if: always()
        run: |
          VIDEO_FILE="youtube/shorts_v2/.work/${SHORT_INDEX}/output.mp4"
          if [ ! -f "$VIDEO_FILE" ]; then
            echo "::warning::post-gate skipped — video not found at $VIDEO_FILE (pipeline likely exited before composing)"
            exit 0
          fi
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$VIDEO_FILE" | cut -d. -f1)
          if [ "$DURATION" -gt 60 ]; then
            echo "::error title=spec-gate-shorts::Shorts duration=${DURATION}s > 60s。Shorts として認識されない"
            exit 1
          fi
          if [ "$DURATION" -lt 15 ]; then
            echo "::error title=spec-gate-shorts::Shorts duration=${DURATION}s < 15s。短すぎ"
            exit 1
          fi
          SIZE=$(stat -c%s "$VIDEO_FILE")
          if [ "$SIZE" -lt 500000 ]; then
            echo "::error title=spec-gate-shorts::Shorts size=${SIZE} bytes < 500KB。中身が空 (画像取得失敗等) の疑い"
            exit 1
          fi
          echo "OK shorts_v2 spec-compliance gate passed: duration=${DURATION}s size=${SIZE}B"

      - name: Report
        if: always()
        run: |
          if [ -n "${{ steps.pipe.outputs.video_url }}" ]; then
            echo "::notice title=Shorts v2 SUCCESS::index=${SHORT_INDEX} url=${{ steps.pipe.outputs.video_url }}"
          else
            echo "::error title=Shorts v2 FAILED::index=${SHORT_INDEX} - no video_url emitted"
            exit 1
          fi
