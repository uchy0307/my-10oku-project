name: Shorts v2 (samurai clean pipeline)

# 新規 clean Shorts pipeline (2026-05-21). 既存 youtube_shorts_auto.yml には依存しない。
# stock 済の youtube/shorts_v2/scripts/short_${SHORT_INDEX}.json を元に edge-tts + ffmpeg で
# 9:16 動画を生成して @japanese.samurai.channel に upload する。

on:
  workflow_dispatch:
    inputs:
      short_index:
        description: 'Short index (001-005)'
        type: string
        required: true
        default: '001'

permissions:
  contents: read
  actions: read

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SHORT_INDEX: ${{ inputs.short_index }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg + fonts-noto-cjk
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg fonts-noto-cjk
          fc-cache -f
          ffmpeg -version | head -n 1
          fc-list | grep -i 'noto sans cjk jp' | head -3 || echo "noto cjk jp font check"

      - name: Install edge-tts
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts==6.1.10
          edge-tts --help | head -3

      - name: Install npm deps (googleapis only needed)
        run: npm install --no-audit --no-fund googleapis@144

      - name: Validate script file exists
        run: |
          test -f "youtube/shorts_v2/scripts/short_${SHORT_INDEX}.json" \
            || (echo "missing script: youtube/shorts_v2/scripts/short_${SHORT_INDEX}.json" && exit 1)
          echo "script ok: youtube/shorts_v2/scripts/short_${SHORT_INDEX}.json"

      - name: Run shorts_v2 pipeline
        id: pipe
        run: node youtube/shorts_v2/pipeline.mjs

      - name: Report
        if: always()
        run: |
          if [ -n "${{ steps.pipe.outputs.video_url }}" ]; then
            echo "::notice title=Shorts v2 SUCCESS::index=${SHORT_INDEX} url=${{ steps.pipe.outputs.video_url }}"
          else
            echo "::error title=Shorts v2 FAILED::index=${SHORT_INDEX} - no video_url emitted"
          fi
