name: YouTube Auto Cycle

on:
  workflow_dispatch:
  schedule:
    # 1日2本配信
    # 23:00 UTC = 日本時間 08:00 (朝)
    - cron: '0 23 * * *'
    # 11:00 UTC = 日本時間 20:00 (夜)
    - cron: '0 11 * * *'

permissions:
  contents: write

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ffmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg fonts-noto-cjk
          ffmpeg -version | head -n 1

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run YouTube cycle
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PLAYLIST_ALL_ID: PLDSFeBtTVyQ1A0BLUQpbv_JLdqEscfYJl
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run youtube:cycle

      - name: Commit & push state changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f youtube/output/state.json ]; then
            git add -f youtube/output/state.json
          fi
          # topics.json も補充された場合はコミット
          git add youtube/topics.json || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(youtube): update state.json [skip ci]"
            git pull --rebase origin main || git rebase --abort || true
            git push origin main || git push origin main --force-with-lease
          fi
