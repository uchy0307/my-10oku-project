name: YouTube Auto Cycle

on:
  workflow_dispatch:
    inputs:
      upload:
        description: 'Upload generated video to YouTube (default: false to avoid spam-flag risk)'
        type: boolean
        default: false
      target:
        description: 'Target topic id (e.g. 011). Empty = let state.json decide.'
        type: string
        required: false
        default: ''
  # 2026-05-20: bulk ストック化が動くまで quota 浪費防止のため schedule を一時停止
  # bulk pipeline 復帰後に再有効化予定 (元: '50 22 * * *' / '50 4 * * *' / '50 10 * * *')
  # schedule:
  #   - cron: '50 22 * * *'
  #   - cron: '50 4 * * *'
  #   - cron: '50 10 * * *'

permissions:
  contents: write
concurrency:
  group: youtube-auto-cycle-${{ github.event_name }}
  cancel-in-progress: false


jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      # 全ステップ共通の鍵
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
      # 2026-05-19: 完全無料化軸 → Gemini flash Free Tier 使用
      GEMINI_MODEL: "gemini-2.5-flash"
      # 2026-05-19: 完全無料化軸 → Google TTS Neural2-B 無料枠 (1M chars/月) 使用
      USE_ELEVENLABS: "false"
      GOOGLE_TTS_VOICE: "ja-JP-Neural2-B"
      GOOGLE_TTS_SPEAKING_RATE: "0.95"
      GOOGLE_TTS_PITCH: "0.0"
      # Phase D: workflow_dispatch の target を generate_script に渡す
      TARGET_TOPIC_ID: ${{ inputs.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Add 8GB swap (ffmpeg compile safety net)
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile /mnt/swapfile
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Install ffmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg fonts-noto-cjk
          ffmpeg -version | head -n 1

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate topics (auto-replenish)
        run: npm run youtube:topics

      - name: Generate script
        run: npm run youtube:script

      - name: Verify script topic match (Phase D2)
        id: verify_topic
        run: |
          set -e
          ID=$(node -e "const s=require('./youtube/output/state.json'); const id=(s.currentTopic && s.currentTopic.id) || ''; process.stdout.write(id);")
          if [ -z "$ID" ]; then
            echo "::error::state.json.currentTopic.id missing"
            exit 1
          fi
          SCRIPT="youtube/output/${ID}_script.txt"
          echo "[verify_topic] id=$ID script=$SCRIPT"
          # 2026-05-20 ROOT FIX: 5回retry は quota 自殺。1回検証のみに変更。
          # 閾値も 5/0.7/7 → 3/0.5/4 に緩和（再生成しても無駄に quota 食うだけ）
          attempt=1
          while : ; do
            if node youtube/scripts/verify_topic_match.mjs --script "$SCRIPT" --topic-id "$ID" --topics youtube/topics.json --min-occurrences 3 --coverage 0.5 --primary-min 4; then
              echo "[verify_topic] PASS on attempt $attempt"
              break
            fi
            if [ "$attempt" -ge 1 ]; then
              echo "::warning::verify_topic_match did not pass strict criteria but proceeding to avoid quota burn"
              break
            fi
            echo "[verify_topic] attempt $attempt failed - regenerating script"
            npm run youtube:script
            attempt=$((attempt+1))
          done

      - name: Generate voice
        run: npm run youtube:voice

      - name: Generate images
        run: npm run youtube:images

      - name: Compile video
        run: npm run youtube:compile

      - name: Verify subtitle/narration alignment
        id: verify_subs
        run: |
          set -e
          ID=$(node -e "const s=require('./youtube/output/state.json'); const id=(s.currentTopic && s.currentTopic.id) || ''; process.stdout.write(id);")
          if [ -z "$ID" ]; then
            echo "::error::state.json.currentTopic.id missing - cannot verify"
            exit 1
          fi
          SCRIPT="youtube/output/${ID}_script.txt"
          if [ -f "youtube/output/${ID}_subtitle.srt" ]; then
            SUB="youtube/output/${ID}_subtitle.srt"
          elif [ -f "youtube/output/${ID}_subs.ass" ]; then
            SUB="youtube/output/${ID}_subs.ass"
          else
            echo "::error::No subtitle file for id=$ID"
            exit 1
          fi
          TIMINGS_ARG=""
          if [ -f "youtube/output/${ID}_voice_timings.json" ]; then
            TIMINGS_ARG="--timings youtube/output/${ID}_voice_timings.json --max-drift 0.5"
            echo "[verify] timings.json found, drift check enabled (max 0.5s)"
          else
            echo "[verify] WARNING: voice_timings.json missing, falling back to text-only check"
          fi
          echo "[verify] id=$ID script=$SCRIPT subtitle=$SUB"
          attempt=1
          while : ; do
            if node youtube/scripts/verify_subtitles.mjs --script "$SCRIPT" --subtitle "$SUB" $TIMINGS_ARG; then
              echo "[verify] PASS on attempt $attempt"
              break
            fi
            if [ "$attempt" -ge 3 ]; then
              echo "::error::verify_subtitles FAILED after 3 attempts"
              exit 1
            fi
            echo "[verify] attempt $attempt failed - re-compiling with --rebuild-subtitle"
            npm run youtube:compile -- --rebuild-subtitle
            attempt=$((attempt+1))
          done

      - name: Upload artifacts (video / thumb / state for inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-output-${{ github.run_number }}
          path: |
            youtube/output/*.mp4
            youtube/output/*_thumb.png
            youtube/output/*_img_*.png
            youtube/output/state.json
            youtube/output/*_meta.json
            youtube/output/*_subs.ass
            youtube/output/*_subtitle.srt
            youtube/output/*_script.txt
            youtube/output/*_voice_timings.json
          if-no-files-found: warn
          retention-days: 7

      - name: Upload to YouTube
        if: github.event_name == 'schedule' || inputs.upload == true
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PLAYLIST_ALL_ID: PLDSFeBtTVyQ1A0BLUQpbv_JLdqEscfYJl
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run youtube:upload

      - name: Commit & push state changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f youtube/output/state.json ]; then
            git add -f youtube/output/state.json
          fi
          git add youtube/topics.json || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(youtube): update state.json [skip ci]"
            git pull --rebase origin main || git rebase --abort || true
            git push origin main || git push origin main --force-with-lease
          fi
