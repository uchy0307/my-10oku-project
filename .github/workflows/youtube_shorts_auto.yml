name: YouTube Shorts Auto

# 既存歴史 YouTube long video から 60s Shorts を 1日3本生成 → upload
# cron: JST 10:30 / 16:30 / 22:30 (UTC 01:30 / 07:30 / 13:30)

on:
  workflow_dispatch:
    inputs:
      source_video_id:
        description: 'Source YouTube videoId (empty = pick latest from state.json)'
        type: string
        required: false
        default: ''
      clip_start:
        description: 'Clip start sec (empty = auto-pick unused slot from START_GRID via state)'
        type: string
        required: false
        default: ''
      clip_duration:
        description: 'Clip duration sec (max 59)'
        type: string
        required: false
        default: '58'
  schedule:
    - cron: '30 1 * * *'
    - cron: '30 7 * * *'
    - cron: '30 13 * * *'

permissions:
  contents: write
  actions: read

jobs:
  shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # 古い YOUTUBE_* (May 13 値) が invalid_client で reject されるようになったため、
      # May 16 に追加された NEW_YOUTUBE_* secret 一式へ切替。
      YOUTUBE_CLIENT_ID: ${{ secrets.NEW_YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.NEW_YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.NEW_YOUTUBE_REFRESH_TOKEN }}
      YOUTUBE_PLAYLIST_ALL_ID: PLDSFeBtTVyQ1A0BLUQpbv_JLdqEscfYJl
      SHORTS_VIDEO_ID: ${{ inputs.source_video_id }}
      SHORTS_CLIP_START: ${{ inputs.clip_start }}
      SHORTS_CLIP_DURATION: ${{ inputs.clip_duration }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ffmpeg + yt-dlp
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          ffmpeg -version | head -n 1
          yt-dlp --version

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Find latest successful main workflow run
        id: find_main_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          RUN_ID=$(gh run list --workflow=youtube_auto.yml --status=success --branch=main --limit=1 --json databaseId -q '.[0].databaseId' || true)
          echo "main_run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "found main run id: $RUN_ID"

      - name: Download main workflow artifact (source mp4)
        if: steps.find_main_run.outputs.main_run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: youtube-output-*
          run-id: ${{ steps.find_main_run.outputs.main_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: youtube/output/
          merge-multiple: true

      - name: Resolve SHORTS_LOCAL_FILE from latest mp4
        id: resolve_local
        run: |
          MP4=$(ls -t youtube/output/*_video.mp4 2>/dev/null | head -n 1 || true)
          if [ -n "$MP4" ]; then
            echo "Found local source: $MP4"
            echo "local_file=$MP4" >> $GITHUB_OUTPUT
          else
            echo "No local mp4 found; Shorts will try yt-dlp."
            echo "local_file=" >> $GITHUB_OUTPUT
          fi

      - name: Run Shorts pipeline
        env:
          SHORTS_LOCAL_FILE: ${{ steps.resolve_local.outputs.local_file }}
        run: node youtube/scripts/shorts_pipeline.mjs

      - name: Upload artifacts (shorts state for inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-output-${{ github.run_number }}
          path: |
            youtube/output/shorts_state.json
          if-no-files-found: warn
          retention-days: 7

      - name: Commit shorts_state.json
        if: always()
        # 削除済み video が deadVideos に追記された場合、upload 失敗でも次回 run が
        # それを skip できるよう永続化したいので always() で commit する。
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f youtube/output/shorts_state.json ]; then
            git add -f youtube/output/shorts_state.json
            if git diff --staged --quiet; then
              echo "No shorts_state changes."
            else
              git commit -