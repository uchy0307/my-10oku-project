name: refill-wiki-images

# 自動補充: 毎日 03:00 UTC (= 12:00 JST) に実行
# ストック残量 < 500 枚なら 500 枚追加ダウンロードして commit
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Force fetch N images (overrides threshold)"
        required: false
        default: ""
      initial:
        description: "Initial bulk fetch (1000 image target)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  refill:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: false
          # 大きなブロブを引きずらないため shallow
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          # 標準ライブラリだけで動くスクリプトだが requests を入れておくと将来拡張しやすい
          pip install requests

      - name: Run refill (auto or manual)
        id: run
        env:
          GH_TARGET: ${{ github.event.inputs.target }}
          GH_INITIAL: ${{ github.event.inputs.initial }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          ARGS=""
          if [ -n "$GH_TARGET" ]; then
            ARGS="--target $GH_TARGET"
          elif [ "${GH_INITIAL:-false}" = "true" ]; then
            ARGS="--initial"
          fi
          echo "running: python scripts/wiki_image_refill.py $ARGS"
          python scripts/wiki_image_refill.py $ARGS

      - name: Show stock count
        run: |
          DIR="youtube/stock_images/wiki"
          if [ -d "$DIR" ]; then
            COUNT=$(find "$DIR" -maxdepth 1 -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' \) | wc -l)
            echo "current stock = $COUNT"
            echo "stock=$COUNT" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit & push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add youtube/stock_images/wiki scripts/wiki_refill.log || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          STAMP=$(date -u +"%Y-%m-%dT%H:%MZ")
          git commit -m "chore(stock): refill wiki images ($STAMP)"
          git push

      - name: Upload log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiki-refill-log
          path: scripts/wiki_refill.log
          if-no-files-found: ignore
          retention-days: 14
